services:
  - type: web
    name: hotel-line-crm
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-line-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: PGSSL
        value: "false"
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: hotel-line-uploads
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: hotel-line-db
    plan: basic-256mb
    diskSizeGB: 1
